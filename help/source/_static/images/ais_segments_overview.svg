<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" font-family="Arial, sans-serif">
  <defs>
    <marker id="ovArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>

  <text x="500" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a2e">
    AIS pings to linestring segments (TDKC compression)
  </text>

  <!-- ============================================================ -->
  <!-- PANEL A: Raw AIS pings                                      -->
  <!-- ============================================================ -->
  <rect x="20" y="55" width="300" height="350" rx="8" fill="#f5f9ff" stroke="#1976D2" stroke-width="1.5"/>
  <text x="170" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D47A1">
    1. Raw AIS pings
  </text>
  <text x="170" y="98" text-anchor="middle" font-size="11" fill="#444">
    One row per AIS broadcast (~3-10 s)
  </text>

  <!-- Track suggestion line (lightly visible) -->
  <path d="M 60 360 Q 90 320 130 300 T 220 220 Q 250 200 280 130"
        fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- 20 raw ping dots -->
  <g fill="#1976D2">
    <circle cx="60"  cy="360" r="3.5"/>
    <circle cx="72"  cy="350" r="3.5"/>
    <circle cx="85"  cy="338" r="3.5"/>
    <circle cx="98"  cy="328" r="3.5"/>
    <circle cx="112" cy="316" r="3.5"/>
    <circle cx="128" cy="302" r="3.5"/>
    <circle cx="144" cy="289" r="3.5"/>
    <circle cx="160" cy="275" r="3.5"/>
    <circle cx="176" cy="262" r="3.5"/>
    <circle cx="190" cy="249" r="3.5"/>
    <circle cx="203" cy="235" r="3.5"/>
    <circle cx="215" cy="220" r="3.5"/>
    <circle cx="226" cy="204" r="3.5"/>
    <circle cx="237" cy="188" r="3.5"/>
    <circle cx="247" cy="172" r="3.5"/>
    <circle cx="256" cy="158" r="3.5"/>
    <circle cx="264" cy="148" r="3.5"/>
    <circle cx="270" cy="140" r="3.5"/>
    <circle cx="275" cy="135" r="3.5"/>
    <circle cx="280" cy="130" r="3.5"/>
  </g>

  <text x="170" y="385" text-anchor="middle" font-size="11" font-style="italic" fill="#555">
    20 pings / vessel / minute
  </text>

  <!-- ============================================================ -->
  <!-- Arrow from A to B                                            -->
  <!-- ============================================================ -->
  <line x1="325" y1="230" x2="355" y2="230" stroke="#333" stroke-width="2" marker-end="url(#ovArrow)"/>
  <text x="340" y="220" text-anchor="middle" font-size="10" fill="#555">TDKC</text>

  <!-- ============================================================ -->
  <!-- PANEL B: Keep only pings where COG/SOG changes "enough"      -->
  <!-- ============================================================ -->
  <rect x="360" y="55" width="300" height="350" rx="8" fill="#f3fff5" stroke="#388E3C" stroke-width="1.5"/>
  <text x="510" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">
    2. Keep "important" pings
  </text>
  <text x="510" y="98" text-anchor="middle" font-size="11" fill="#444">
    Course / speed change exceeds threshold
  </text>

  <!-- Track suggestion line -->
  <path d="M 400 360 Q 430 320 470 300 T 560 220 Q 590 200 620 130"
        fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Greyed-out (discarded) pings -->
  <g fill="#ccc">
    <circle cx="412" cy="350" r="3"/>
    <circle cx="425" cy="338" r="3"/>
    <circle cx="438" cy="328" r="3"/>
    <circle cx="452" cy="316" r="3"/>
    <circle cx="484" cy="289" r="3"/>
    <circle cx="500" cy="275" r="3"/>
    <circle cx="516" cy="262" r="3"/>
    <circle cx="530" cy="249" r="3"/>
    <circle cx="543" cy="235" r="3"/>
    <circle cx="566" cy="204" r="3"/>
    <circle cx="577" cy="188" r="3"/>
    <circle cx="587" cy="172" r="3"/>
    <circle cx="596" cy="158" r="3"/>
    <circle cx="610" cy="140" r="3"/>
    <circle cx="615" cy="135" r="3"/>
  </g>

  <!-- Kept pings (5 endpoints) -->
  <g fill="#1B5E20" stroke="#fff" stroke-width="1.5">
    <circle cx="400" cy="360" r="6"/>
    <circle cx="468" cy="302" r="6"/>
    <circle cx="555" cy="220" r="6"/>
    <circle cx="604" cy="148" r="6"/>
    <circle cx="620" cy="130" r="6"/>
  </g>

  <!-- Annotation: course change arrow -->
  <text x="475" y="295" font-size="10" fill="#1B5E20" font-style="italic">course change</text>
  <text x="555" y="245" font-size="10" fill="#1B5E20" font-style="italic">speed change</text>

  <text x="510" y="385" text-anchor="middle" font-size="11" font-style="italic" fill="#555">
    5 keepers, 15 dropped
  </text>

  <!-- ============================================================ -->
  <!-- Arrow from B to C                                            -->
  <!-- ============================================================ -->
  <line x1="665" y1="230" x2="695" y2="230" stroke="#333" stroke-width="2" marker-end="url(#ovArrow)"/>
  <text x="680" y="220" text-anchor="middle" font-size="10" fill="#555">join</text>

  <!-- ============================================================ -->
  <!-- PANEL C: Linestring segments in PostGIS                      -->
  <!-- ============================================================ -->
  <rect x="700" y="55" width="280" height="350" rx="8" fill="#fff8f0" stroke="#E65100" stroke-width="1.5"/>
  <text x="840" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#BF360C">
    3. PostGIS linestrings
  </text>
  <text x="840" y="98" text-anchor="middle" font-size="11" fill="#444">
    One row per constant-COG/SOG leg
  </text>

  <!-- 4 linestring segments with arrowheads (showing direction) -->
  <line x1="740" y1="360" x2="808" y2="302" stroke="#BF360C" stroke-width="2.5" marker-end="url(#ovArrow)"/>
  <line x1="808" y1="302" x2="895" y2="220" stroke="#BF360C" stroke-width="2.5" marker-end="url(#ovArrow)"/>
  <line x1="895" y1="220" x2="944" y2="148" stroke="#BF360C" stroke-width="2.5" marker-end="url(#ovArrow)"/>
  <line x1="944" y1="148" x2="960" y2="130" stroke="#BF360C" stroke-width="2.5" marker-end="url(#ovArrow)"/>

  <!-- Endpoint dots -->
  <g fill="#BF360C" stroke="#fff" stroke-width="1.5">
    <circle cx="740" cy="360" r="5"/>
    <circle cx="808" cy="302" r="5"/>
    <circle cx="895" cy="220" r="5"/>
    <circle cx="944" cy="148" r="5"/>
    <circle cx="960" cy="130" r="5"/>
  </g>

  <!-- Schema label hint -->
  <text x="725" y="385" font-size="10" fill="#555">
    <tspan x="725" dy="0">segments_YYYY_M:</tspan>
    <tspan x="725" dy="13">(mmsi, date1, date2, cog, sog, geom)</tspan>
  </text>

  <!-- ============================================================ -->
  <!-- Footer note                                                  -->
  <!-- ============================================================ -->
  <text x="500" y="440" text-anchor="middle" font-size="11" fill="#444">
    Compression ratio depends on track and thresholds; an open-sea Baltic
    voyage typically goes from millions of pings to tens of thousands of segments.
  </text>
</svg>
